<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenpAI — Anime/Manga RAG Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>SenpAI</h1>
    <p class="subtitle">Ask about anime/manga — answers grounded in retrieved sources.</p>
    <div id="messages"></div>
    <form id="chat-form">
      <input id="query" type="text" placeholder="e.g. What genre is Fullmetal Alchemist?" autocomplete="off" />
      <button type="submit">Ask</button>
    </form>
  </main>
  <script src="app.js"></script>
</body>
</html>
